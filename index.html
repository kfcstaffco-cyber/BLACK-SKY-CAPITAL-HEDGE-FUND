<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Black-Sky Capital | Digital Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --bg: #050505;
      --card: #0a0a0a;
      --border: #1a1a1a;
      --text: #e0e0e0;
      --text-dim: #666;
      --text-bright: #fff;
      --gold: #d4af37;
      --green: #4caf50;
      --red: #f44336;
      --accent: #111;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      line-height: 1.5;
    }

    /* ── LAYOUT ────────────────────────────────────────────────── */
    .app-container { display: none; padding: 20px; max-width: 1400px; margin: 0 auto; }
    .grid-main { display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-top: 20px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .card-header { margin-bottom: 20px; border-left: 2px solid var(--gold); padding-left: 15px; }
    .card-title { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
    .card-subtitle { font-size: 18px; font-weight: 500; color: var(--text-bright); }

    /* ── INVESTOR SPECIFIC ─────────────────────────────────────── */
    .investor-card-wrapper { border-bottom: 1px solid var(--border); padding: 15px 0; transition: background 0.2s; }
    .investor-card-wrapper:hover { background: rgba(255,255,255,0.02); }
    
    .player-row { display: flex; justify-content: space-between; align-items: center; }
    .avatar { width: 35px; height: 35px; background: #111; border: 1px solid #333; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--gold); font-family: 'DM Mono'; font-weight: bold; }
    .player-info { flex: 1; margin-left: 15px; }
    .player-name { font-weight: 600; color: var(--text-bright); font-size: 15px; }
    .metric-value.gold { color: var(--gold); font-family: 'DM Mono'; font-weight: 500; }

    .transaction-history { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

    /* ── STATS ─────────────────────────────────────────────────── */
    .row-label { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #111; font-size: 13px; }
    .stat-key { color: var(--text-dim); }
    .stat-value { font-family: 'DM Mono'; }

    /* ── TICKER ────────────────────────────────────────────────── */
    #ticker-wrap { background: #000; border-bottom: 1px solid var(--border); height: 30px; display: flex; align-items: center; overflow: hidden; position: sticky; top: 0; z-index: 1000; }
    .ticker { display: flex; white-space: nowrap; animation: scroll 60s linear infinite; }
    .ticker-item { padding: 0 30px; font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-dim); }
    @keyframes scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    /* ── UTILS ─────────────────────────────────────────────────── */
    #loading-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #error-banner { display: none; background: var(--red); color: white; padding: 10px; text-align: center; font-size: 12px; }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div style="color: var(--gold); font-family: 'DM Mono'; letter-spacing: 5px; margin-bottom: 10px;">BLACK-SKY</div>
    <div style="color: #333; font-size: 10px;">ENCRYPTING LEDGER...</div>
  </div>

  <div id="error-banner"></div>

  <div id="ticker-wrap"><div id="ticker-feed" class="ticker"></div></div>

  <div id="app" class="app-container">
    
    <div class="grid-main">
      <div class="card">
        <div class="card-header">
          <div class="card-title">Investor Roster</div>
          <div class="card-subtitle">Aggregate Stakeholders</div>
        </div>
        <div id="investor-list">
          <div style="color: #333; padding: 20px;">Synchronizing ledger entries...</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Fund Statistics</div>
        </div>
        <div id="ownership-stats"></div>
      </div>
    </div>

    <div class="grid-2">
       <div class="card">
         <div class="card-header"><div class="card-title">Ownership Share</div></div>
         <div id="ownership-list-alt"></div>
       </div>
       <div class="card">
         <div class="card-header"><div class="card-title">P&L Pro-rata</div></div>
         <div id="pnl-share-stats"></div>
       </div>
    </div>

  </div>

  <script>
    const $ = id => document.getElementById(id);
    const SHEET_TABS = { fundMeasures: 'Measures!A1:B20', positions: 'Positions!A1:G50', investors: 'Investors!A1:C100', ticker: 'Ticker!A1:C20' };
    const REFRESH_INTERVAL = 60000;

    // ── DATA PROCESSING ──────────────────────────────────────────
    
    function parseInvestors(rows) {
      if (!rows || rows.length < 2) return [];
      const grouped = {};
      
      rows.slice(1).forEach(row => {
        const name = row[0];
        const date = row[1];
        const amount = parseFloat(String(row[2]).replace(/[^0-9.-]+/g, "")) || 0;
        if (!name) return;

        if (!grouped[name]) {
          grouped[name] = { name, totalBalance: 0, history: [] };
        }
        grouped[name].totalBalance += amount;
        grouped[name].history.push({ date, amount });
      });
      return Object.values(grouped);
    }

    function parsePositions(rows) { return rows ? rows.slice(1) : []; }
    function parseFundMeasures(rows) {
      const data = {};
      if (rows) rows.forEach(r => data[r[0]] = r[1]);
      return data;
    }

    // ── UI RENDERING ─────────────────────────────────────────────

    function renderInvestors(investors) {
      const roster = $('investor-list');
      const ownership = $('ownership-stats');
      if (!roster) return;

      const grandTotal = investors.reduce((sum, inv) => sum + inv.totalBalance, 0);
      roster.innerHTML = '';
      if (ownership) ownership.innerHTML = '';

      investors.forEach((inv, index) => {
        const id = `inv-details-${index}`;
        const totalShare = grandTotal > 0 ? ((inv.totalBalance / grandTotal) * 100).toFixed(2) : "0.00";

        roster.innerHTML += `
          <div class="investor-card-wrapper">
            <div class="player-row" onclick="toggleTrans('${id}')" style="cursor:pointer">
              <div class="avatar">${inv.name.charAt(0)}</div>
              <div class="player-info">
                <div class="player-name">${inv.name}</div>
                <div style="font-size: 9px; color: var(--text-dim); text-transform: uppercase;">${inv.history.length} Transactions</div>
              </div>
              <div style="text-align: right;">
                <div class="metric-value gold">$${(inv.totalBalance / 1e9).toFixed(2)}B</div>
                <div style="font-size: 9px; color: var(--text-dim);">AGGREGATE</div>
              </div>
            </div>
            <div id="${id}" class="transaction-history" style="display:none; padding: 15px 0 10px 50px; margin-top: 10px; border-left: 1px solid var(--gold);">
              ${inv.history.map(t => `
                <div style="display:flex; justify-content:space-between; margin-bottom: 8px;">
                  <div>
                    <div style="font-size: 11px; color: var(--text-bright);">${t.date}</div>
                    <div style="font-size: 9px; color: var(--text-dim);">DEPOSIT LOG</div>
                  </div>
                  <div style="text-align: right;">
                    <div style="color: var(--gold); font-size: 11px;">$${(t.amount / 1e9).toFixed(2)}B</div>
                    <div style="font-size: 9px; color: var(--text-dim);">${((t.amount / grandTotal) * 100).toFixed(2)}% share</div>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;

        if (ownership) {
          ownership.innerHTML += `
            <div class="row-label">
              <span class="stat-key">${inv.name}</span>
              <span class="stat-value gold">${totalShare}%</span>
            </div>
          `;
        }
      });
    }

    function renderAll(data) {
      if (data.investors) renderInvestors(data.investors);
      // Add other render calls here (positions, measures) if needed
    }

    // ── CORE FUNCTIONS ──────────────────────────────────────────

    function toggleTrans(id) {
      const el = $(id);
      if (el) el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'block' : 'none';
    }

    async function fetchSheet(id, key, range) {
      const url = `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/${range}?key=${key}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`Sheet access denied: ${res.statusText}`);
      const d = await res.json();
      return d.values;
    }

    async function launchDashboard() {
      // PULL FROM SESSION OR PROMPT
      let sheetId = sessionStorage.getItem('bsc_sheet_id') || prompt("Enter Sheet ID:");
      let apiKey = sessionStorage.getItem('bsc_api_key') || prompt("Enter API Key:");
      
      if (!sheetId || !apiKey) return;
      sessionStorage.setItem('bsc_sheet_id', sheetId);
      sessionStorage.setItem('bsc_api_key', apiKey);

      $('loading-screen').style.display = 'flex';

      try {
        const [mRows, pRows, iRows, tRows] = await Promise.all([
          fetchSheet(sheetId, apiKey, SHEET_TABS.fundMeasures),
          fetchSheet(sheetId, apiKey, SHEET_TABS.positions),
          fetchSheet(sheetId, apiKey, SHEET_TABS.investors),
          fetchSheet(sheetId, apiKey, SHEET_TABS.ticker)
        ]);

        const measures = parseFundMeasures(mRows);
        measures.positions = parsePositions(pRows);
        measures.investors = parseInvestors(iRows);
        
        $('loading-screen').style.display = 'none';
        $('app').style.display = 'block';
        
        renderAll(measures);
        renderTicker(tRows);

        // Auto Refresh
        setInterval(async () => {
           const [mr, pr, ir, tr] = await Promise.all([
            fetchSheet(sheetId, apiKey, SHEET_TABS.fundMeasures),
            fetchSheet(sheetId, apiKey, SHEET_TABS.positions),
            fetchSheet(sheetId, apiKey, SHEET_TABS.investors),
            fetchSheet(sheetId, apiKey, SHEET_TABS.ticker)
           ]);
           renderAll({ ...parseFundMeasures(mr), positions: parsePositions(pr), investors: parseInvestors(ir) });
           renderTicker(tr);
        }, REFRESH_INTERVAL);

      } catch (err) {
        console.error(err);
        $('loading-screen').style.display = 'none';
        $('error-banner').style.display = 'block';
        $('error-banner').innerText = "FATAL: " + err.message;
      }
    }

    function renderTicker(rows) {
      if (!rows) return;
      const feed = $('ticker-feed');
      const html = rows.map(r => `
        <div class="ticker-item">
          ${r[0]} <span style="color:${r[2].includes('-') ? 'var(--red)' : 'var(--green)'}">${r[1]} (${r[2]}%)</span>
        </div>
      `).join('');
      feed.innerHTML = html + html;
    }

    // START
    window.onload = launchDashboard;

  </script>
</body>
</html>
